defaults:
  - /experiment: highway_image_gold
  - /logging: default
  - _self_
debug: false
seed: 42
device: auto # "auto" | "cpu" | "cuda"
run:
  name: ""
  run_dir: ${hydra:runtime.output_dir}
  notes: ""
  deterministic: false
runtime:
  resume:
    mode: null # "null" | "resume" | "init_from"
    path: null # path to resuming checkpoint
    resume_rng_state: false
