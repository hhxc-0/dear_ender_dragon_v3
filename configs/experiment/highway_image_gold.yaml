# @package _global_
# Phase 1 gold config (Highway with grayscale image observation)
defaults:
  - /env: highway_image
  - /algo: ppo_gold
  - /model: cnn_actor_critic_gold
  - /optim: adam_gold
  - _self_
train:
  total_env_steps: 32768
rollout:
  n_envs: 1 # looks like multiple envs doesn’t work with highway environments
  n_steps: 1024 # steps per update (T)
checkpoint:
  save_every_steps: 4096 # int or null (no saves)
  final_save: true # save at the end
  save_rng_state: true # turn on later if you want stricter reproducibility
